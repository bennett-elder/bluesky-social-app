appId: xyz.blueskyweb.app
---
- runScript:
    file: ../setupServer.js
    env:
      SERVER_PATH: "?users&follows&videoposts"
- runFlow:
    file: ../setupApp.yml
- tapOn:
    id: "e2eSignInAlice"
- extendedWaitUntil:
    visible:
      id: "viewHeaderHomeFeedPrefsBtn"
- tapOn:
    id: "e2eRefreshHome"
- waitForAnimationToEnd

# Default: setting off — videos play inline, no collapsed alt text button
- assertNotVisible:
    id: "altTextVideoButton"

# Enable "Oops! All text"
- tapOn:
    id: "e2eGotoContentAndMedia"
- tapOn: "Oops! All text"
- tapOn:
    id: "e2eGotoHome"
- tapOn:
    id: "e2eRefreshHome"
- waitForAnimationToEnd

# Setting on — video posts show collapsed alt text button
- assertVisible:
    id: "altTextVideoButton"

# Tap to expand (goes to showingThumbnail state)
- tapOn:
    id: "altTextVideoButton"

# Expanded — "Close video" button now visible
- assertVisible: "Close video"

# Tap to collapse back
- tapOn: "Close video"

# Collapsed again — alt text button is back
- assertVisible:
    id: "altTextVideoButton"

# Disable "Oops! All text" (cleanup)
- tapOn:
    id: "e2eGotoContentAndMedia"
- tapOn: "Oops! All text"
