appId: xyz.blueskyweb.app
---
- runScript:
    file: ../setupServer.js
    env:
      SERVER_PATH: "?users&follows&videoposts"
- runFlow:
    file: ../setupApp.yml
- extendedWaitUntil:
    visible:
      id: "viewHeaderHomeFeedPrefsBtn"
- tapOn:
    id: "e2eRefreshHome"
- waitForAnimationToEnd

# Default: setting off — videos play inline, no alt text boxes
- assertNotVisible: "No Alt Text"

# Enable "Oops! All text"
- tapOn:
    id: "e2eGotoContentAndMedia"
- tapOn: "Oops! All text"
- tapOn:
    id: "e2eGotoHome"
- tapOn:
    id: "e2eRefreshHome"
- waitForAnimationToEnd

# Setting on — video posts show "No Alt Text" collapsed box
- assertVisible: "No Alt Text"

# Tap to expand (goes to showingThumbnail state)
- tapOn: "No Alt Text"

# Expanded — "Close video" button now visible
- assertVisible: "Close video"

# Tap to collapse back
- tapOn: "Close video"

# Collapsed again — "No Alt Text" is back
- assertVisible: "No Alt Text"

# Disable "Oops! All text" (cleanup)
- tapOn:
    id: "e2eGotoContentAndMedia"
- tapOn: "Oops! All text"
