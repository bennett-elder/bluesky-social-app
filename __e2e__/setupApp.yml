appId: xyz.blueskyweb.app
---
- launchApp:
    appId: "xyz.blueskyweb.app"
    clearState: true
    arguments:
      "-EXDevMenuIsOnboardingFinished": true
- runFlow:
    when:
      platform: iOS
    commands:
      - tapOn: 'http://localhost:8081'
- runFlow:
    when:
      platform: Android
    commands:
      - tapOn: 'http://localhost:8081'
      - runFlow:
          label: "Dismiss Expo dev menu"
          when:
            visible: "Continue"
          commands:
            - back
- extendedWaitUntil:
    visible:
      id: e2eProxyHeaderInput
    timeout: 60000
- tapOn:
    id: e2eProxyHeaderInput
- inputText: ${output.result}
- pressKey: Enter
